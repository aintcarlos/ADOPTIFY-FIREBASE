<!DOCTYPE html>
<html>
<head>
  <title>Add Pet</title>
  <link rel="stylesheet" href="css/add-pet.css">
</head>

<body>

<header>
  <a href="adopt-now.html" id="backBtn">← Back</a>
</header>

<h2>Add a Pet</h2>

<form id="addPetForm">

  <label>Pet Name</label>
  <input type="text" id="petName" required>

  <label>Pet Type</label>
  <select id="petType" required>
    <option value="">Select type</option>
    <option>Dog</option>
    <option>Cat</option>
  </select>

  <label>Age</label>
  <input type="number" id="petAge" required>

  <label>Breed</label>
  <input type="text" id="petBreed" required>

  <label>Bio</label>
  <textarea id="petBio" required></textarea>

  <!-- DROPZONE -->
  <div id="dropzone" class="dropzone">
    Click or Drag Image Here
  </div>

  <!-- FILE INPUT (hidden, outside dropzone) -->
  <input type="file" id="petImageFile" accept="image/*" style="display:none;">

  <!-- PREVIEW -->
  <img id="preview" style="display:none; width:200px; margin-top:10px; border-radius:10px;">

  <button type="submit">Add Pet</button>

</form>

<!-- Firebase SDKs (non-module, compat version) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script> <!-- 🔥 THIS IS MISSING -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script src="js/add-pet.js"></script>
</body>
</html>
